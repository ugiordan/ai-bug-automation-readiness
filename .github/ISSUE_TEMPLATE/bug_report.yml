name: Bug Report
description: Report a bug in the assessment tool
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, etc.
      placeholder: "Python 3.12, macOS 15"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant output
      render: shell
    validations:
      required: false
