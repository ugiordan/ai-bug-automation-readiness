# Weekly automated report generation
# Clones repos from scan-config.json and regenerates the HTML report
name: Update readiness report

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/share/swift /usr/local/share/boost \
            /usr/local/share/powershell /usr/local/lib/heroku \
            /usr/share/az_* /opt/microsoft /usr/local/share/chromium \
            /usr/local/lib/node_modules /usr/share/miniconda /usr/share/kotlinc \
            /usr/share/gradle-* /usr/share/sbt
          sudo docker image prune --all --force
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Clone repos from scan config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/clone-repos.py scan-config.json /tmp/repos

      - name: Generate HTML report
        run: |
          python assess.py --batch /tmp/repos --format html \
            --title "AI Bug Automation Readiness" -o docs/report.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report.html
          if git diff --cached --quiet; then
            echo "No changes to report"
          else
            git commit -m "Update readiness report ($(date -u +%Y-%m-%d))"
            git push
          fi
