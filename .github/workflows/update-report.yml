name: Update readiness report

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone repos from scan config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/clone-repos.py scan-config.json /tmp/repos

      - name: Generate report
        run: |
          python assess.py --batch /tmp/repos --format html \
            --title "AI Bug Automation Readiness" -o docs/report.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/report.html
          if git diff --cached --quiet; then
            echo "No changes to report"
          else
            git commit -m "Update readiness report ($(date -u +%Y-%m-%d))"
            git push
          fi
